# Sharp secret-scan config. Extends gitleaks defaults with a project rule.
title = "sharp-gitleaks"

[extend]
useDefault = true

[[rules]]
id = "solana-keypair-array"
description = "Solana keypair secret key (64-byte integer array)"
regex = '''\[\s*\d{1,3}(\s*,\s*\d{1,3}){47,}\s*\]'''
keywords = ["secretkey", "keypair"]
